<!DOCTYPE html>
<html lang="zh-CN">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>MoveQuest 星轨</title>
  <meta name="description" content="MoveQuest 星轨是一款用现实走动为游戏充能的运动激励 App。">
  <link rel="icon" href="data:image/svg+xml,%3Csvg xmlns='http://www.w3.org/2000/svg' viewBox='0 0 64 64'%3E%3Crect width='64' height='64' rx='18' fill='%23111512'/%3E%3Ccircle cx='32' cy='32' r='20' fill='%23dfff4f'/%3E%3Ccircle cx='32' cy='32' r='8' fill='%23ff6a4d'/%3E%3C/svg%3E">
  <link rel="stylesheet" href="styles.css">
</head>
<body>
  <main class="app-shell">
    <section class="screen start-screen active" data-screen="start">
      <div class="brand-orbit" aria-hidden="true">
        <canvas id="intro-canvas" width="360" height="280"></canvas>
        <span class="brand-core">MQ</span>
      </div>

      <div class="start-copy">
        <p class="eyebrow">MoveQuest 星轨</p>
        <h1>走一段路，点亮今天的星轨。</h1>
        <p>先走路收集同步次数，再回到星轨画面。角色碰到光点时点“同步”，点亮所有光点就完成今天的运动。</p>
      </div>

      <form class="setup-card" id="setup-form">
        <label>
          昵称
          <input id="name-input" maxlength="8" value="阿澈" autocomplete="off">
        </label>
        <label>
          今日目标
          <select id="goal-select">
            <option value="easy">热身：走 40 步，点亮 4 个光点</option>
            <option value="daily" selected>日常：走 96 步，点亮 6 个光点</option>
            <option value="hard">挑战：走 144 步，点亮 8 个光点</option>
          </select>
        </label>
        <button class="primary-action" type="submit">开始走路游戏</button>
      </form>
    </section>

    <section class="screen play-screen" data-screen="play">
      <header class="topbar">
        <div>
          <p class="eyebrow" id="session-label">课间快走</p>
          <h2><span id="player-name">阿澈</span>的星轨</h2>
        </div>
        <div class="streak-pill">
          <span>连续</span>
          <strong id="streak-label">0</strong>
        </div>
      </header>

      <section class="score-panel">
        <article>
          <span>今日步数</span>
          <strong id="steps-label">0</strong>
        </article>
        <article>
          <span>同步次数</span>
          <strong id="pulse-label">0</strong>
        </article>
        <article>
          <span>已点亮</span>
          <strong id="lit-label">0/6</strong>
        </article>
      </section>

      <section class="orbit-stage">
        <canvas id="game-canvas" width="720" height="720" aria-label="星轨游戏画面"></canvas>
        <div class="orbit-hint" id="orbit-hint">开始走动，让星轨亮起来</div>
      </section>

      <section class="action-dock">
        <button class="motion-button" type="button" id="motion-button">
          <span id="motion-label">开始走动</span>
          <small id="motion-subtitle">目标约 96 步</small>
        </button>
        <button class="sync-button" type="button" id="sync-button">
          <span>同步</span>
          <small id="sync-subtitle">踩准时机点亮</small>
        </button>
      </section>

      <section class="social-strip">
        <div>
          <span>好友助攻</span>
          <strong id="friend-title">小雨在线</strong>
          <p id="friend-copy">送你 2 次同步，不聊天也能互相拉一把。</p>
        </div>
        <button class="quiet-action" type="button" id="friend-button">领取</button>
      </section>

      <section class="achievement-strip">
        <div class="mini-achievement" id="badge-motion">
          <span>动起来</span>
          <strong>0/1</strong>
        </div>
        <div class="mini-achievement" id="badge-sync">
          <span>点亮光点</span>
          <strong>0/3</strong>
        </div>
        <div class="mini-achievement" id="badge-clear">
          <span>完成星轨</span>
          <strong>0/1</strong>
        </div>
      </section>
    </section>

    <div class="result-modal" id="result-modal" aria-hidden="true">
      <div class="result-card">
        <span class="result-symbol" id="result-symbol">光</span>
        <h3 id="result-title">已点亮</h3>
        <p id="result-copy">继续保持节奏。</p>
        <button class="primary-action" type="button" id="close-result">继续</button>
      </div>
    </div>
  </main>

  <div class="toast-region" id="toast-region" aria-live="polite" aria-atomic="true"></div>
  <div class="confetti-layer" id="confetti-layer" aria-hidden="true"></div>

  <script src="app.js"></script>
</body>
</html>
